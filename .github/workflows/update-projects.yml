name: Update Projects Section

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/update-projects.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate project cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_projects.py

      - name: Commit and push (or open PR if branch is protected)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes, skipping."
            exit 0
          fi
          git add README.md img/pins/
          git commit -m "chore: update projects section [skip ci]"
          # Try direct push first; if rejected due to branch protection, open a PR
          if git push origin main 2>/dev/null; then
            echo "Pushed directly."
          else
            BRANCH="bot/update-projects-$(date +%Y%m%d%H%M%S)"
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: update projects section" \
              --body "Automated update of the Projects section in README." \
              --base main \
              --head "$BRANCH" \
              --label "automated" 2>/dev/null || true
            echo "Opened PR from $BRANCH"
          fi
